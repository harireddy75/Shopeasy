<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEasy</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="navbar">
        <h2>🛒 ShopEasy</h2>
    
        <input
    type="text"
    id="search"
    placeholder="Search products..."
    onkeyup="searchProducts()">
    
    <button onclick="window.location.href='cart.html'">
        Cart 🛍️ (<span id="cart-count">0</span>)
    </button>
    </header>
    
    <h1>Top Products</h1>
    
    <div class="products">
    
        <div class="card">
            <img src="images/iphone.jpg" alt="iPhone">
            <h3>iPhone 16</h3>
            <p style="color:red;">20% OFF</p>
            <p>₹79,999</p>
            <p>⭐⭐⭐⭐☆ (4.3)</p>
            <button onclick="addToCart('iPhone 16',79999)">Add to Cart</button>
        </div>
    
        <div class="card">
            <img src="images/tv.jpg" alt="Samsung TV">
            <h3>Samsung TV</h3>
            <p>₹45,000</p>
            <p>⭐ 4.5/5</p>
            <button onclick="addToCart('Samsung TV',45000)">Add to Cart</button>
        </div>
    
        <div class="card">
            <img src="images/headphones.jpg" alt="Headphones">
            <h3>Headphones</h3>
            <p>₹2,999</p>
            <p>⭐⭐⭐⭐☆ (4.3)</p>
            <button onclick="addToCart('Headphones',2999)">Add to Cart</button>
        </div>
    
    </div>
    <h2>🛒 Shopping Cart</h2>

    <ul id="cart-items">
    </ul>
    
    <h3>Total: ₹<span id="total-price">0</span></h3>
    
    <button id="checkout" onclick="window.location.href='checkout.html'">
        Checkout
    </button>
    
    <script src="script.js"></script>
   
</body>
</html>
